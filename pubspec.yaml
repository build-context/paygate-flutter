name: paygate
description: Paygate SDK for Flutter - Present paywalls, onboarding flows, and more in your app.
version: 0.1.7
homepage: https://github.com/build-context/paygate-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: PaygateFlutterPlugin
      android:
        package: com.paygate.paygate
        pluginClass: PaygateFlutterPlugin
