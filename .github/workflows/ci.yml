name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - name: Detect version and tag status
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | tr -d "'" | cut -d+ -f1)
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to pub.dev
        if: steps.ver.outputs.changed == 'true'
        env:
          PUB_TOKEN: ${{ secrets.PUB_TOKEN }}
        run: |
          if [ -z "${PUB_TOKEN:-}" ]; then
            echo "::notice::PUB_TOKEN not set; skipping pub.dev publish"
            exit 0
          fi
          flutter pub get
          dart pub token add https://pub.dev --env-var=PUB_TOKEN
          dart pub publish --force
      - name: Create and push release tag
        if: steps.ver.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
